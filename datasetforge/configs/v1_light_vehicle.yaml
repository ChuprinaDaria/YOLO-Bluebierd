# Phase 1 smoke — light_vehicle (cls 7).
# Клон v1_apc_reference.yaml для GAZ Tigr / civilian car / mil-pickup.

version: df-v1.0.0-dev
seed: 42

class:
  name: light_vehicle
  id: 7
  # Реальна довжина цілі у метрах — нормалізація max-dim 3D-моделі.
  # GAZ Tigr = 5.7 м. Per-class (БТР 7.7, танк ~9.5 зі стволом) — НЕ хардкод.
  target_size_m: 5.7
  models:
    # Реальні файли у datasetforge/assets/models/light_vehicle/.
    # render_runner.py globs *.glb/.gltf/.fbx/.obj/.blend і ігнорує цей список —
    # тут лише документація для людей.
    - gaz-2330_tigr.glb
    - russian_gaz_tigr.glb
    - russian_gaz_tigr_version_2.glb

count: 20             # Phase 1 smoke; Phase 2 = 200; Phase 3 = 600
# РЕНДЕР У НАТИВНУ РОЗДІЛЬНІСТЬ СЕНСОРА. Стара схема (640×640 при hfov 6°)
# давала GSD у 3× гірший за реальну камеру → «вся техніка як крапки».
# 1920×1080 + реальний hfov = піксельний масштаб 1-в-1 як на борту.
image_size: [1920, 1080]
image_size_diffusion: [1920, 1080]   # v2 notebooks рендерять Blender у це ж (без squash)

camera:
  # РЕАЛЬНИЙ ДРОН: робоча висота 150-200 м, крейсерська ~300 м.
  # Ширококутна камера, два апаратні варіанти HFOV: 92° або 112°.
  # distance (line-of-sight) — похідна: d = altitude / sin(view_angle).
  altitude_m: [150, 200, 300]
  # view_angle — елевація над горизонтом (90 = надір).
  # Кути <30° на цих висотах дають ціль <5px min-side (за горизонтом pixel budget)
  # — camera_sampler.filter_viable викине такі комбінації сам і залогує.
  view_angle_deg: [30, 45, 60, 90]
  # Два варіанти камери. Пиксельний бюджет @1920, ціль 5.7 м (див. pixel_budget.md):
  #   92°:  надір 150м = 35px довжина / 14px min-side;  надір 300м = 18/7px
  #   112°: надір 150м = 25/10px;  надір 300м = 12/5px (нежиттєздатно → skip)
  # Крейсерські 300 м виживають ТІЛЬКИ у режимі 92° при кутах 60-90°.
  hfov_deg: [92, 112]
  sensor:
    width: 1920
    height: 1080
    modality: EO

scene:
  # Bias до road-сцен: «техніка посеред поля» — це коли road-landscapes рідкі.
  # dirt_road двічі + road_under_vehicle (нижче) кладе колію під техніку у Blender.
  landscapes: [dirt_road, field, dirt_road, forest_belt]
  seasons: [summer, autumn_mud, winter, spring]
  weather: [clear, fog, haze, rain]
  time_of_day: [day, dusk]
  # Road strip ВИМКНЕНО: на aerial-масштабі примітив-смуга рендериться як стерильна
  # світла/біла полоса під технікою (плоский матеріал без текстури) і ще й тече у
  # depth/edge-conditioning → Qwen домальовує її як білу дорогу. Дорогу дає сам
  # landscape (dirt_road ground texture) + промпт. False = чисто, без «білих ліній».
  road_under_vehicle: false

# Hard negatives РЕАЛІЗОВАНО у render_runner: кожен ~7-й вихідний кадр (ratio 0.15)
# — порожній ландшафт БЕЗ техніки (чесний anti-FP negative). Кадри, де техніка
# видима, але sub-threshold, у датасет НЕ потрапляють (discard, не false negative).
hard_negatives:
  ratio: 0.15
  types:
    - empty_landscape

output:
  format: yolo
  # min-side фільтр bbox У ПІКСЕЛЯХ РЕНДЕРА (1920-wide). 6px — це нижня межа
  # детекції для крейсерських 300 м @92°; тренувати ТІЛЬКИ з SAHI-тайлінгом /
  # imgsz≥1280, інакше resize до 640 знову зробить з цілей крапки
  # (див. configs/train_smallobj_recommended.yaml).
  min_side_px: 6
  split:
    train: 0.7
    valid: 0.2
    test: 0.1
  metadata_sidecar: true

# Stage 3+4 — Flux depth-conditioned background inpaint. Default OFF —
# Blender-only path (Phase 1) не торкаємо. v2_smoke notebook вмикає вручну.
#
# Stack: FLUX.1-Depth-dev — офіційний BFL inpaint з вбудованим depth conditioning.
# НЕ потребує окремого ControlNet — depth подається через control_image параметр.
diffusion:
  enabled: false
  base_model: black-forest-labs/FLUX.1-Depth-dev
  pipeline: FluxControlInpaintPipeline
  # [h, w]. 16:9 під сенсор 1920×1080 (~1MP, кратне 16 — Flux native budget).
  # Квадрат 1024×1024 сквошив кадр 1.78:1 → фон з викривленим масштабом.
  # Composite потім розтягує AI-фон назад у 1920×1080; піксели ТЕХНІКИ лишаються
  # з Blender-рендера 1920 (frozen mask) — деталь цілі не втрачається.
  inference_size: [768, 1344]
  steps: 30
  # guidance 10 давав «пластик» + оверсатурацію. Flux-dev natural look ~3-4;
  # нижче guidance = фотографічніше, менше CGI-гладкості. Sweep 3.0-5.0.
  guidance: 3.5
  # FLUX-dev distilled → negative_prompt працює ЛИШЕ при true_cfg_scale>1
  # (це ≈×2 час інференсу). 1.0 = негатив ігнорується; 2-4 = негатив активний.
  true_cfg_scale: 1.0
  # Realism-LoRA — найсильніший анти-«пластик». enabled=false у бібліотечному
  # дефолті (опт-ін, бо тягне ваги з HF). Notebook SETTINGS вмикає для смоуку.
  # LoRA для FLUX.1-dev зазвичай застосовні і до Depth-dev (ті самі attention).
  lora:
    enabled: false
    repo: XLabs-AI/flux-RealismLora
    weight_name: lora.safetensors
    adapter_name: realism
    scale: 0.8
  # strength 1.0 = повністю викидав Blender-ґрунт (правильний aerial масштаб) і
  # Flux вигадував текстуру не в тому масштабі. <1 лишає Blender-структуру/масштаб
  # і лише «фотореалізує» її. Sweep 0.80-0.95.
  strength: 0.88
  mask_dilate_px: 4       # safety belt навколо vehicle alpha
  mask_feather_px: 2      # softer seam між vehicle і AI bg
  # Базовий template — без «cinematic / sharp focus / high detail». Landscape-cue,
  # scale-cue і camera-cue дочіпляє prompts.build_prompt (drone EO, не кінокадр).
  prompt_template: "aerial drone reconnaissance photo of a {landscape} in {season}, {weather}, {sun_cardinal} sunlight at {sun_elevation_deg:.0f} degrees elevation, shot from {altitude_m:.0f} meters altitude at {view_angle_deg:.0f} degrees oblique top-down angle"
  # Опційні override для prompts.py (закоментовано = вшиті дефолти з drone-realism).
  # landscape_cues: {dirt_road: "...", field: "...", forest_belt: "..."}
  # scale_cue: "..."
  # camera_cue: "..."
  negative_prompt: "person, soldier, vehicle, tank, truck, car, motorcycle, building, road sign, text, watermark, ui, 3d render, cgi, render, video game, unreal engine, octane, blender, plastic, glossy, waxy, airbrushed, cinematic, dramatic lighting, golden hour, lens flare, bokeh, depth of field, hdr, oversaturated, vivid, overprocessed, masterpiece, artstation, oversharpened, illustration, painting, blurry, low quality"
  seed_offset: 1000
  # Relight ON: техніка лита Blender-світлом ≠ Flux-фон. match_color робить
  # per-channel exposure+white-balance match під фон (фікс «різної яскравості»).
  relight:
    enabled: true
    strength: 0.55          # 0=без змін, 1=повна заміна під bg-середнє. Sweep 0.4-0.7.
    match_color: true       # per-channel WB+exposure (false = тільки luma)

# Stage 5 — «шліфування поверх» через albumentations (shared/polish.py).
# Туман/зерно/шум/jpeg/blur — post-processing, НЕ робота генеративної моделі.
# Усі трансформи pixel-only → bbox/мітки НЕ рухаються. Спільний для всіх 3 пайплайнів.
# ПОМ'ЯКШЕНО під фактичний масштаб цілей 12-35px: агресивний jpeg q60 + iso 0.5
# (калібровані під «20-33px» яких не було) стирали структуру цілі повністю.
# Рендер тепер пише q95 → polish-jpeg — ЄДИНА камерна компресія (без подвійного JPEG).
polish:
  enabled: true
  iso_noise:           {p: 0.7,  color_shift: [0.01, 0.04], intensity: [0.05, 0.3]}
  gauss_noise:         {p: 0.3,  std_range: [0.01, 0.04]}   # частка від 255
  motion_blur:         {p: 0.12, blur_limit: [3, 5]}      # цілі 12-35px не терплять розмиття
  defocus:             false                               # ВИМКНЕНО: давав суцільний soft-focus blanket (фото-«шлак»)
  fog:                 {p: 0.25, fog_coef_range: [0.05, 0.2], alpha_coef: 0.08}
  brightness_contrast: {p: 0.5,  brightness: 0.12, contrast: 0.12}
  chromatic:           {p: 0.3,  primary: 0.02, secondary: 0.01}
  downscale:           {p: 0.1,  scale_range: [0.9, 0.97]}   # 0.85 з'їдав min-side 6px цілі
  jpeg:                {p: 0.9,  quality: [75, 90]}          # головний «дрон» tell; q60 вбивав 6-10px цілі
  seed_offset: 9000
