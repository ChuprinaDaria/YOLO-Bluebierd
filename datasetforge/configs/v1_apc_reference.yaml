# Reference config — replicate synthetic_apc_726 style
# Single-class APC base, для перевірки що pipeline працює аналогічно до референсного output.
#
# МІГРОВАНО на робочу схему камери (altitude × view_angle × hfov):
# стара версія (altitude_m + hfov 70, image_size 640) не читалась render_runner
# і давала GSD у 3× гірший за реальний сенсор. Параметри камери — реальний дрон:
# робоча висота 150-200 м, крейсерська ~300 м, HFOV 92°/112°.

version: df-v1.0.0-dev
seed: 42

class:
  name: ifv_apc
  id: 1
  # БТР-80 довжина 7.65 м — нормалізація max-dim моделі (per-class, не хардкод).
  target_size_m: 7.7
  models:
    - apc_btr80
    - apc_btr82
    - apc_mt_lb

count: 700  # ~726 у референсі
image_size: [1920, 1080]              # нативна роздільність сенсора
image_size_diffusion: [1920, 1080]

camera:
  altitude_m: [150, 200, 300]
  view_angle_deg: [30, 45, 60, 90]
  # Два апаратні варіанти камери. Нежиттєздатні комбінації (ціль < min_side_px)
  # відсікає preflight-фільтр camera_sampler.filter_viable з логом.
  hfov_deg: [92, 112]
  sensor:
    width: 1920
    height: 1080
    modality: EO

scene:
  landscapes: [field, forest_belt, dirt_road]
  seasons: [summer, autumn_mud, winter, spring]
  weather: [clear, fog, haze, rain]
  time_of_day: [day, dusk]

# Hard negatives: реалізовано лише empty_landscape (рендер без техніки).
# destroyed_apc / civilian_truck_isolated потребують окремих 3D-моделей — TODO.
hard_negatives:
  ratio: 0.15
  types:
    - empty_landscape

output:
  format: yolo
  min_side_px: 6      # у пікселях рендера (1920-wide); тренувати з SAHI/imgsz≥1280
  split:
    train: 0.7
    valid: 0.2
    test: 0.1
  metadata_sidecar: true

# Камерна деградація — Stage 5 polish (albumentations), як у v1_light_vehicle.yaml.
polish:
  enabled: true
  iso_noise:           {p: 0.7,  color_shift: [0.01, 0.04], intensity: [0.05, 0.3]}
  gauss_noise:         {p: 0.3,  std_range: [0.01, 0.04]}
  motion_blur:         {p: 0.12, blur_limit: [3, 5]}
  defocus:             false
  fog:                 {p: 0.25, fog_coef_range: [0.05, 0.2], alpha_coef: 0.08}
  brightness_contrast: {p: 0.5,  brightness: 0.12, contrast: 0.12}
  chromatic:           {p: 0.3,  primary: 0.02, secondary: 0.01}
  downscale:           {p: 0.1,  scale_range: [0.9, 0.97]}
  jpeg:                {p: 0.9,  quality: [75, 90]}
  seed_offset: 9000
